apiVersion: v1
kind: Service
metadata:
  name: nexus-core-service
spec:
  type: NodePort
  selector:
    app: nexus-core
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-core-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-core
  template:
    metadata:
      labels:
        app: nexus-core
    spec:
      containers:
        - name: nexus-core
          image: nexus-core-service:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-service:5432/nexus_db
            - name: SPRING_DATASOURCE_USERNAME
              value: nexus_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: nexus_password
          ports:
            - containerPort: 8080

